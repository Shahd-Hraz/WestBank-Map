<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة فلسطين التفاعلية - مشروع المساق</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map"></div>

    <div class="map-overlay logo-container">
        <div class="logo-box">
          <img src="logo.png" alt="Logo" style="width:60px; height:60px;">
        </div>
        <div class="leaflet-tag">Leaflet</div>
    </div>

    <div class="map-overlay coords-box">
        <div class="coord-header">Palestine 1923</div>
        <div id="coords-display">
            X: 170000.00 <br>
            Y: 1125000.00
        </div>
    </div>
  <div class="side-controls" style="position: absolute; top: 80px; left: 10px; z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 0;">
    
    <button onclick="locateUser()" style="background: white; border: 2px solid rgba(0,0,0,0.3); border-bottom: none; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center;" title="تحديد موقعي">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
        </svg>
    </button>
    <div style="background: white; border: 2px solid rgba(0,0,0,0.3); width: 45px; font-size: 11px; font-weight: bold; text-align: center; padding: 2px 0; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.2);">Find Me</div>

    <div style="background: white; border: 2px solid rgba(0,0,0,0.3); width: 45px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 1px 5px rgba(0,0,0,0.3);">
        <svg width="35" height="35" viewBox="0 0 24 24">
            <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="#000" stroke="black" stroke-width="1"/>
            <text x="9" y="27" font-family="Arial" font-size="8" font-weight="bold" fill="black">N</text>
        </svg>
    </div>
</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
